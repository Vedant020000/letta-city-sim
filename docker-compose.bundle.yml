services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-letta_city_sim}
      POSTGRES_USER: ${POSTGRES_USER:-sim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sim_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      retries: 5
    volumes:
      - pgdata_bundle:/var/lib/postgresql/data

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.bundle
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sim}:${POSTGRES_PASSWORD:-sim_dev_password}@db:5432/${POSTGRES_DB:-letta_city_sim}
      DB_WAIT_ATTEMPTS: ${DB_WAIT_ATTEMPTS:-60}
      DB_WAIT_SECONDS: ${DB_WAIT_SECONDS:-2}
    entrypoint: ["/app/scripts/db-bootstrap.sh"]
    restart: "no"

  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.bundle
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sim}:${POSTGRES_PASSWORD:-sim_dev_password}@db:5432/${POSTGRES_DB:-letta_city_sim}
      SIM_API_KEY: ${SIM_API_KEY:-dev_key_change_me}
      PORT: 3000
      WORLD_API_PORT: 3001
      DB_WAIT_ATTEMPTS: ${DB_WAIT_ATTEMPTS:-60}
      DB_WAIT_SECONDS: ${DB_WAIT_SECONDS:-2}
    ports:
      - "${PUBLIC_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata_bundle:

